<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web2Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#080b12] text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-5 border-b border-white/10 pb-6 md:flex-row md:items-end md:justify-between">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-cyan-300">Anakin-powered knowledge builder</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white sm:text-4xl">Web2Knowledge</h1>
        <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-400">
          Convert a public URL or topic into clean, searchable chunks ready for AI workflows.
        </p>
      </div>

      <a
        href="/api/export"
        target="_blank"
        class="inline-flex h-11 items-center justify-center rounded-lg border border-cyan-300/30 bg-cyan-300/10 px-4 text-sm font-semibold text-cyan-100 transition hover:border-cyan-200/60 hover:bg-cyan-300/20"
      >
        Export AI Dataset
      </a>
    </header>

    <section class="grid gap-4 py-6 md:grid-cols-3">
      <article class="rounded-lg border border-white/10 bg-white/[0.04] p-4">
        <p class="text-xs font-medium uppercase tracking-[0.16em] text-slate-500">Sources Scraped</p>
        <p id="sourcesStat" class="mt-3 text-3xl font-semibold text-white">0</p>
      </article>
      <article class="rounded-lg border border-white/10 bg-white/[0.04] p-4">
        <p class="text-xs font-medium uppercase tracking-[0.16em] text-slate-500">Chunks Generated</p>
        <p id="chunksStat" class="mt-3 text-3xl font-semibold text-white">0</p>
      </article>
      <article class="rounded-lg border border-white/10 bg-white/[0.04] p-4">
        <p class="text-xs font-medium uppercase tracking-[0.16em] text-slate-500">Search Results</p>
        <p id="resultsStat" class="mt-3 text-3xl font-semibold text-white">0</p>
      </article>
    </section>

    <section class="rounded-lg border border-white/10 bg-slate-950/80 p-5 shadow-2xl shadow-cyan-950/20">
      <div class="grid gap-4 lg:grid-cols-[1fr_auto] lg:items-end">
        <div>
          <label class="block text-sm font-medium text-slate-300" for="input">Input URL or Topic</label>
          <input
            id="input"
            class="mt-2 h-12 w-full rounded-lg border border-white/10 bg-slate-900 px-4 text-sm text-white outline-none transition placeholder:text-slate-600 focus:border-cyan-300/70 focus:ring-4 focus:ring-cyan-300/10"
            placeholder="https://tailwindcss.com/docs or Next.js routing"
          />
        </div>

        <button
          id="buildButton"
          onclick="buildKB()"
          class="inline-flex h-12 items-center justify-center gap-2 rounded-lg bg-cyan-300 px-5 text-sm font-semibold text-slate-950 transition hover:bg-cyan-200 disabled:cursor-not-allowed disabled:bg-slate-700 disabled:text-slate-400"
        >
          <span id="buildSpinner" class="hidden h-4 w-4 animate-spin rounded-full border-2 border-slate-950/30 border-t-slate-950"></span>
          <span id="buildButtonText">Build Knowledge Base</span>
        </button>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <label class="inline-flex h-9 items-center gap-2 rounded-lg border border-cyan-300/30 bg-cyan-300/10 px-3 text-sm text-cyan-100">
          <input class="accent-cyan-300" type="radio" name="mode" value="url" checked />
          URL
        </label>
        <label class="inline-flex h-9 items-center gap-2 rounded-lg border border-white/10 bg-white/[0.03] px-3 text-sm text-slate-300">
          <input class="accent-cyan-300" type="radio" name="mode" value="topic" />
          Topic Search
        </label>
      </div>

      <p id="status" class="mt-4 min-h-5 text-sm text-slate-400"></p>
    </section>

    <section class="mt-5 rounded-lg border border-white/10 bg-slate-950/70 p-5">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div>
          <label class="block text-sm font-medium text-slate-300" for="search">Search Knowledge Base</label>
          <p id="resultCount" class="mt-1 text-xs text-slate-500">Build a dataset to start searching.</p>
        </div>
        <input
          id="search"
          oninput="searchKB()"
          class="h-11 w-full rounded-lg border border-white/10 bg-slate-900 px-4 text-sm text-white outline-none transition placeholder:text-slate-600 focus:border-cyan-300/70 focus:ring-4 focus:ring-cyan-300/10 md:max-w-md"
          placeholder="Search generated chunks..."
        />
      </div>
    </section>

    <section class="flex-1 py-5">
      <div id="results" class="grid gap-4"></div>
    </section>
  </main>

  <script>
    const appState = {
      sources: 0,
      chunks: 0,
      lastResultCount: 0,
      hasBuilt: false,
      isBuilding: false,
    };

    renderEmptyState("Start by building a knowledge base from a URL or topic.");

    async function buildKB() {
      const input = document.getElementById("input").value.trim();
      const mode = document.querySelector('input[name="mode"]:checked').value;

      if (!input) {
        setStatus("Please enter a URL or topic.", "error");
        return;
      }

      setBuilding(true);
      setStatus("Scraping source and preparing chunks...", "loading");
      document.getElementById("results").innerHTML = "";
      updateStats({ sources: 0, chunks: 0, results: 0 });

      try {
        const res = await fetch("/api/build", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input, mode }),
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(`Error: ${data.details || data.error || "Build failed"}`, "error");
          renderEmptyState("The build did not complete. Check the input URL and try again.");
          return;
        }

        appState.hasBuilt = true;
        updateStats({
          sources: data.urls.length,
          chunks: data.totalChunks,
          results: 0,
        });
        setStatus(`Done. Scraped ${data.urls.length} source(s), created ${data.totalChunks} chunks.`, "success");
        await searchKB();
      } catch (err) {
        setStatus("Request failed. Check the server terminal.", "error");
        renderEmptyState("The request could not reach the backend. Make sure the server is running.");
      } finally {
        setBuilding(false);
      }
    }

    async function searchKB() {
      const q = document.getElementById("search").value.trim();
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const results = data.results || [];

      updateStats({ results: results.length });
      updateResultCount(results.length, q);

      if (results.length === 0) {
        if (!appState.hasBuilt) {
          renderEmptyState("Build a knowledge base first, then search across the generated chunks.");
        } else if (q) {
          renderEmptyState(`No exact matches for "${q}". Try a shorter phrase, a related keyword, or search with no filter to browse all chunks.`);
        } else {
          renderEmptyState("No chunks are available yet. Try rebuilding with a public page that has readable text.");
        }
        return;
      }

      document.getElementById("results").innerHTML = results
        .map((item) => {
          const preview = item.content.length > 720 ? `${item.content.slice(0, 720)}...` : item.content;

          return `
            <article class="rounded-lg border border-white/10 bg-white/[0.04] p-5 transition hover:border-cyan-300/40 hover:bg-white/[0.06]">
              <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                <div>
                  <p class="text-xs font-medium uppercase tracking-[0.16em] text-emerald-300">Chunk ${Number(item.chunkIndex) + 1}</p>
                  <h3 class="mt-2 text-lg font-semibold leading-7 text-white">${escapeHtml(item.title)}</h3>
                </div>
                <a href="${escapeAttribute(item.source)}" target="_blank" class="text-xs font-medium text-cyan-300 underline-offset-4 hover:underline">
                  Source
                </a>
              </div>
              <p class="mt-4 text-sm leading-6 text-slate-300">${escapeHtml(preview)}</p>
              <p class="mt-4 truncate text-xs text-slate-500">${escapeHtml(item.source)}</p>
            </article>
          `;
        })
        .join("");
    }

    function setBuilding(isBuilding) {
      appState.isBuilding = isBuilding;
      document.getElementById("buildButton").disabled = isBuilding;
      document.getElementById("buildSpinner").classList.toggle("hidden", !isBuilding);
      document.getElementById("buildButtonText").textContent = isBuilding ? "Building..." : "Build Knowledge Base";
    }

    function setStatus(message, type) {
      const status = document.getElementById("status");
      const color =
        type === "success" ? "text-emerald-300" :
        type === "error" ? "text-rose-300" :
        "text-slate-400";

      status.className = `mt-4 min-h-5 text-sm ${color}`;
      status.textContent = message;
    }

    function updateStats(next) {
      if (typeof next.sources === "number") appState.sources = next.sources;
      if (typeof next.chunks === "number") appState.chunks = next.chunks;
      if (typeof next.results === "number") appState.lastResultCount = next.results;

      document.getElementById("sourcesStat").textContent = appState.sources;
      document.getElementById("chunksStat").textContent = appState.chunks;
      document.getElementById("resultsStat").textContent = appState.lastResultCount;
    }

    function updateResultCount(count, query) {
      const resultCount = document.getElementById("resultCount");
      if (!appState.hasBuilt) {
        resultCount.textContent = "Build a dataset to start searching.";
        return;
      }

      resultCount.textContent = query
        ? `${count} result${count === 1 ? "" : "s"} for "${query}"`
        : `${count} result${count === 1 ? "" : "s"} shown`;
    }

    function renderEmptyState(message) {
      document.getElementById("results").innerHTML = `
        <div class="rounded-lg border border-dashed border-white/15 bg-white/[0.03] p-8 text-center">
          <p class="text-sm font-medium text-slate-300">${escapeHtml(message)}</p>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
